services:
  flask:
    build:
      context: ./flask-app
    expose:
      - "5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    build:
      context: ./redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
    ports:
      - "5000:80"
    depends_on:
      - flask
    restart: unless-stopped

volumes:
  redis-data:
